  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s

  # ===== Spring Boot Backend =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: board-backend
    restart: always
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
    ports:
      - "8080:8080"
    # depends_on:
    #   db:
    #     condition: service_healthy
    networks:
      - board-network

  # ===== React Frontend (Nginx) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: board-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - board-network

# ===== 볼륨 =====
